name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Nom de l'image en minuscules (Docker n'accepte pas les majuscules)
  IMAGE_NAME: ${{ github.repository_owner }}/acwork-api

jobs:
  # ── Tests + Lint ────────────────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: api

      - name: Lint (ruff)
        run: ruff check .
        working-directory: api

      - name: Tests
        run: pytest tests/ -v --tb=short
        working-directory: api
        env:
          API_SECRET_KEY: ci-test-secret-key-at-least-32-chars
          INTERNAL_API_KEY: ci-test-internal-key
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"

  # ── Build + Push image Docker ───────────────────────────────
  # Build uniquement sur push vers main (pas sur les PRs)
  # Pousse sur GitHub Container Registry avec 2 tags :
  #   - ghcr.io/owner/acwork-api:<sha>   → immuable, utilisé pour le deploy
  #   - ghcr.io/owner/acwork-api:latest  → pointeur mobile vers le dernier build
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write   # nécessaire pour pousser sur ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha_tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          dockerfile: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers entre les builds pour accélérer
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ── Deploy sur VPS ──────────────────────────────────────────
  # Tire l'image buildée par le job précédent (tag SHA immuable)
  # Rollback : relancer le workflow sur un commit précédent
  #
  # Secrets GitHub requis (Settings → Secrets → Actions) :
  #
  #   Infrastructure :
  #     SSH_HOST          → IP ou hostname du VPS
  #     SSH_USER          → utilisateur SSH (ex: ubuntu)
  #     SSH_PRIVATE_KEY   → clé privée SSH (contenu de ~/.ssh/id_rsa)
  #     DEPLOY_PATH       → chemin absolu du projet (ex: /home/ubuntu/ACWORK)
  #
  #   Application :
  #     PROD_POSTGRES_PASSWORD   → openssl rand -hex 16
  #     PROD_API_SECRET_KEY      → openssl rand -hex 32
  #     PROD_INTERNAL_API_KEY    → openssl rand -hex 32
  #     PROD_N8N_ENCRYPTION_KEY  → openssl rand -hex 32
  #     PROD_N8N_HOST            → ex: n8n.domain.com
  #     PROD_SENTRY_DSN          → DSN Sentry (laisser vide pour désactiver)
  #     PROD_ALLOWED_ORIGINS     → ex: https://n8n.domain.com
  #     PROD_GRAFANA_PASSWORD    → openssl rand -hex 16
  #     PROD_GF_ALERT_EMAIL      → email destinataire des alertes
  #     PROD_GF_SMTP_ENABLED     → true / false
  #     PROD_GF_SMTP_HOST        → ex: smtp.gmail.com:587
  #     PROD_GF_SMTP_USER        → adresse email SMTP
  #     PROD_GF_SMTP_PASSWORD    → mot de passe app SMTP
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Récupérer le dernier code (configs, scripts, etc.)
            git pull origin main

            # Écrire le .env prod depuis les secrets GitHub
            # L'image est taguée avec le SHA exact du commit → déploiement traçable
            cat > .env << 'ENVEOF'
            # ── PostgreSQL ──────────────────────────────────────
            POSTGRES_USER=admin
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            N8N_DB_NAME=n8n
            API_DB_NAME=appdb

            # ── Redis ───────────────────────────────────────────
            REDIS_URL=redis://redis:6379/0

            # ── n8n ─────────────────────────────────────────────
            N8N_HOST=${{ secrets.PROD_N8N_HOST }}
            N8N_PROTOCOL=https
            N8N_WEBHOOK_URL=https://${{ secrets.PROD_N8N_HOST }}/
            N8N_EDITOR_BASE_URL=https://${{ secrets.PROD_N8N_HOST }}/
            N8N_ENCRYPTION_KEY=${{ secrets.PROD_N8N_ENCRYPTION_KEY }}
            N8N_EXECUTIONS_MODE=queue

            # ── FastAPI ──────────────────────────────────────────
            API_SECRET_KEY=${{ secrets.PROD_API_SECRET_KEY }}
            API_ENV=production
            ALLOWED_ORIGINS=${{ secrets.PROD_ALLOWED_ORIGINS }}
            INTERNAL_API_KEY=${{ secrets.PROD_INTERNAL_API_KEY }}
            DATABASE_URL=postgresql+asyncpg://admin:${{ secrets.PROD_POSTGRES_PASSWORD }}@postgres:5432/appdb

            # ── Celery ───────────────────────────────────────────
            CELERY_CONCURRENCY=4
            WEB_CONCURRENCY=4

            # ── Docker image (versionnée avec le SHA du commit) ──
            DOCKER_IMAGE_API=ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

            # ── Monitoring ───────────────────────────────────────
            SENTRY_DSN=${{ secrets.PROD_SENTRY_DSN }}
            GRAFANA_PASSWORD=${{ secrets.PROD_GRAFANA_PASSWORD }}
            GF_ALERT_EMAIL=${{ secrets.PROD_GF_ALERT_EMAIL }}
            GF_SMTP_ENABLED=${{ secrets.PROD_GF_SMTP_ENABLED }}
            GF_SMTP_HOST=${{ secrets.PROD_GF_SMTP_HOST }}
            GF_SMTP_USER=${{ secrets.PROD_GF_SMTP_USER }}
            GF_SMTP_PASSWORD=${{ secrets.PROD_GF_SMTP_PASSWORD }}
            GF_SMTP_FROM_ADDRESS=${{ secrets.PROD_GF_SMTP_USER }}
            GF_SMTP_FROM_NAME=ACWORK Grafana

            # ── General ──────────────────────────────────────────
            TIMEZONE=America/Cayenne
            LOG_LEVEL=info
            ENVEOF
            chmod 600 .env

            # Authentification ghcr.io pour tirer l'image (utilise le PAT ou GITHUB_TOKEN)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Tirer l'image pré-buildée (plus rapide que de builder sur le VPS)
            docker compose pull api celery-worker celery-beat

            # Redémarrage sans downtime des services applicatifs
            docker compose up -d --no-deps api celery-worker celery-beat

            # Vérification de santé post-deploy
            sleep 5
            curl -sf http://localhost:8000/api/v1/ping || exit 1

            echo "Deployment successful — ${{ github.sha }}"
            echo "Image: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
