name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Tests + Lint ────────────────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: api

      - name: Lint (ruff)
        run: ruff check .
        working-directory: api

      - name: Tests
        run: pytest tests/ -v --tb=short
        working-directory: api
        env:
          API_SECRET_KEY: ci-test-secret-key-at-least-32-chars
          INTERNAL_API_KEY: ci-test-internal-key
          DATABASE_URL: sqlite+aiosqlite:///:memory:

  # ── Deploy sur VPS ──────────────────────────────────────────
  # Ne s'exécute que sur push vers main (pas sur les PRs)
  # Nécessite les secrets GitHub suivants :
  #   SSH_HOST        → IP ou hostname du VPS
  #   SSH_USER        → utilisateur SSH (ex: ubuntu)
  #   SSH_PRIVATE_KEY → clé privée SSH (contenu du fichier ~/.ssh/id_rsa)
  #   DEPLOY_PATH     → chemin absolu du projet sur le VPS (ex: /home/ubuntu/ACWORK)
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Récupérer le dernier code
            git pull origin main

            # Rebuild uniquement les services modifiés + redémarrage sans downtime
            docker compose build api celery-worker celery-beat
            docker compose up -d --no-deps api celery-worker celery-beat

            # Vérifier que l'API répond
            sleep 5
            curl -sf http://localhost:8000/api/v1/ping || exit 1

            echo "Deployment successful — $(git rev-parse --short HEAD)"
