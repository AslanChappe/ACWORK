repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^api/
        exclude: ^api/alembic/
      - id: ruff-format
        files: ^api/
        exclude: ^api/alembic/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^api/app/
        args: [--config-file=api/pyproject.toml]
        additional_dependencies:
          - pydantic>=2.7.0
          - pydantic-settings>=2.3.0
          - sqlalchemy[asyncio]>=2.0.0
          - types-passlib>=1.7.7
