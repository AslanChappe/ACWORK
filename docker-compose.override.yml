# ============================================================
# Local Development Override — auto-loaded by docker compose
# Usage: docker compose up -d  (no extra flag needed)
# ============================================================

name: n8n-stack

services:

  postgres:
    ports:
      - "5434:5432"   # 5432 et 5433 occupés par des Postgres natifs → port 5434

  redis:
    ports:
      - "6379:6379"   # accès direct depuis le host (Redis Insight, tests locaux)

  n8n:
    environment:
      N8N_PROTOCOL: http
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      N8N_EXECUTIONS_MODE: queue          # queue mode actif même en local
    ports:
      - "5678:5678"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    environment:
      API_ENV: development
      LOG_LEVEL: debug
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"

  celery-worker:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    environment:
      API_ENV: development
      LOG_LEVEL: debug
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./api:/app   # code monté → redémarre le worker manuellement après modif
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=debug
      --concurrency=2
      --queues=tasks,default

  celery-beat:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    environment:
      API_ENV: development
      LOG_LEVEL: debug
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./api:/app
      - celery_beat_data:/app/celerybeat
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=debug
      --schedule=/app/celerybeat/celerybeat-schedule

  # Nginx désactivé en local — accès direct via :5678 (n8n) et :8000 (api)
  nginx:
    profiles:
      - production

  # ── Monitoring (optionnel) — démarrer avec : docker compose --profile monitoring up -d
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles:
      - monitoring
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/fastapi.json
      # Unified alerting (Grafana 9+)
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
      # SMTP — laisser GF_SMTP_ENABLED=false pour désactiver les emails
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${GF_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${GF_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GF_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GF_SMTP_FROM_ADDRESS:-grafana@localhost}
      GF_SMTP_FROM_NAME: ${GF_SMTP_FROM_NAME:-ACWORK Grafana}
      # Adresse de destination des alertes
      GF_ALERT_EMAIL: ${GF_ALERT_EMAIL:-admin@localhost}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - internal

volumes:
  prometheus_data:
  grafana_data:
