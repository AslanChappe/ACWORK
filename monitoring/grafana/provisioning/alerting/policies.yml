apiVersion: 1

policies:
  - orgId: 1
    receiver: ACWORK Alerts
    group_by: [alertname, severity]
    group_wait: 30s        # attente avant d'envoyer le premier groupement
    group_interval: 5m     # intervalle entre groupements successifs
    repeat_interval: 4h    # re-notifie si l'alerte reste active
    routes:
      # Les critiques remontent immédiatement
      - receiver: ACWORK Alerts
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
