# ── n8n (racine) + FastAPI (/api/) ─────────────────────────
# Serveur unique — srv1595159.hstgr.cloud
# n8n      : https://srv1595159.hstgr.cloud/
# FastAPI  : https://srv1595159.hstgr.cloud/api/
server {
    listen 443 ssl http2;
    server_name srv1595159.hstgr.cloud;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── FastAPI (/api/) ──────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # Health check — pas de rate limit, pas de log
    location = /api/v1/ping {
        proxy_pass http://api_backend;
        access_log off;
    }

    # Métriques Prometheus — jamais exposées publiquement
    location /metrics {
        return 403;
    }

    # Assets statiques n8n — pas de rate limit (chargés en masse au démarrage)
    location /assets/ {
        proxy_pass         http://n8n_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400" always;

        # Réappliquer les security headers (héritage bloqué par location spécifique)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
    }

    # ── n8n (racine — tout le reste) ─────────────────────────
    location / {
        limit_req zone=n8n burst=50 nodelay;

        proxy_pass         http://n8n_backend;
        proxy_http_version 1.1;

        # WebSocket requis pour l'éditeur n8n
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }
}
